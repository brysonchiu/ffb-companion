name: scrape-stats
env:
  FANTASY_PROS_USER: ${{ secrets.FANTASY_PROS_USER }}
  FANTASY_PROS_PASS: ${{ secrets.FANTASY_PROS_PASS }}
on:
  workflow_dispatch:
  schedule:
    # Every day of August @ 3:30am EST (7:30 UTC)
    - cron: '30 7 * 8 *'
    # Days 1-15 of September @ 3:30am EST (7:30 UTC)
    - cron: '30 7 1-15 9 *'
    # Every Tuesday of all other months @ 3:30am EST (7:30 UTC)
    - cron: '30 7 * 1-7,10-12 2'
jobs:
  scrape-stats:
    runs-on: macos-latest
    steps:
      - name: Checkout Chron Branch
        uses: actions/checkout@v3
        with:
          ref: master
      - name: Setup Node.js environment
        uses: actions/setup-node@v4
        with:
          node-version: 24
          check-latest: true
          cache: 'npm'
      - name: Install Dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Scraper Script
        run: node scraper/scraper.ts
      - name: Commit and Push
        run: |
          git config user.name "Automated"
          git config user.email "actions@users.noreply.github.com"
          git add public/stats.json public/stats-timestamp.json
          git commit -m "automated player stats update"
          git push
